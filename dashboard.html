<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h2>Contribution Dashboard</h2>
<button onclick="logout()">Logout</button>

<br><br>

<input id="amount" type="number" placeholder="Enter amount">
<button onclick="addMoney()">Add</button>

<h3>All Contributions</h3>
<ul id="list"></ul>

<h3>Total: <span id="total">0</span></h3>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDH13zGB73gOBAOFcy3mKyVPr-x5d8TfnA",
  authDomain: "contribution-app-eae0f.firebaseapp.com",
  projectId: "contribution-app-eae0f",
  storageBucket: "contribution-app-eae0f.firebasestorage.app",
  messagingSenderId: "350830812968",
  appId: "1:350830812968:web:489a14456a980bd0077a1d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Auth check
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
  }
});

// Logout
window.logout = () => {
  signOut(auth);
};

// Add contribution
window.addMoney = async () => {
  let amount = document.getElementById("amount").value;
  let user = auth.currentUser.email;

  if (!amount) {
    alert("Enter amount");
    return;
  }

  await addDoc(collection(db, "contributions"), {
    user: user,
    amount: Number(amount)
  });

  document.getElementById("amount").value = "";
};

// Live update
onSnapshot(collection(db, "contributions"), (snapshot) => {
  let list = document.getElementById("list");
  let total = 0;

  list.innerHTML = "";

  snapshot.forEach(doc => {
    let data = doc.data();

    let li = document.createElement("li");
    li.innerText = data.user + " = " + data.amount;
    list.appendChild(li);

    total += data.amount;
  });

  document.getElementById("total").innerText = total;
});
</script>

</body>
</html>
