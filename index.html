<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>

<h2>Register</h2>
<input id="regEmail" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<button onclick="register()">Register</button>

<h2>Login</h2>
<input id="logEmail" placeholder="Email">
<input id="logPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDH13zGB73gOBAOFcy3mKyVPr-x5d8TfnA",
  authDomain: "contribution-app-eae0f.firebaseapp.com",
  projectId: "contribution-app-eae0f",
  storageBucket: "contribution-app-eae0f.firebasestorage.app",
  messagingSenderId: "350830812968",
  appId: "1:350830812968:web:489a14456a980bd0077a1d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Register
window.register = async function () {
  let email = document.getElementById("regEmail").value;
  let pass = document.getElementById("regPass").value;

  try {
    await createUserWithEmailAndPassword(auth, email, pass);
    alert("Registered!");
  } catch (e) {
    alert(e.message);
  }
};

// Login
window.login = async function () {
  let email = document.getElementById("logEmail").value;
  let pass = document.getElementById("logPass").value;

  try {
    await signInWithEmailAndPassword(auth, email, pass);
    window.location.href = "dashboard.html";
  } catch (e) {
    alert("Login failed");
  }
};
</script>

</body>
</html>
